<!DOCTYPE html>
<html>
<head>
    <title>웹사이트</title>
    <style>
        body { text-align: center; background-color: #f0f8ff; font-family: sans-serif; }
        h1 { color: #333; }
        button { padding: 10px 20px; cursor: pointer; }
        
        /* 공룡 게임 버튼 스타일 */
        .game-link-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;

            padding: 15px 25px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            background-color: #4CAF50;
            color: white;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); /* 그림자를 진하게 해서 띄워진 느낌 강조 */
            transition: 0.3s;
            z-index: 999;
        }
        .game-link-btn:hover {
            background-color: #45a049;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <h1>안녕하세요! 제 웹사이트에 오신 걸 환영합니다.</h1>
    <p>안녕하세요</p>
    <button onclick="alert('반가워요!')">인사하기</button>

    <div style="text-align: center; margin-top: 50px;">
        <h3>버튼을 클릭해 보세요!</h3>
        <button id="counterBtn" onclick="updateButton()" style="padding: 20px 40px; font-size: 30px; cursor: pointer; background-color: #008CBA; color: white; border: none; border-radius: 10px; transition: 0.2s;">
            0
        </button>
    </div>

    <div style="margin-top: 40px;">
        <a href="dino.html" class="game-link-btn">🦖 공룡 게임</a>
    </div>

    <script>
        let count = 0;
        function updateButton() {
            count = count + 1;
            const btn = document.getElementById("counterBtn");
            btn.innerText = count;
            if (count % 10 == 0) {
                btn.style.backgroundColor = "red";
            } else {
                btn.style.backgroundColor = "#008CBA";
            }
        }
    </script>
</body>
</html>
