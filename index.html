<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투게더 보드 - 로그인</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="login-bg">
    <div class="login-container card glass-effect">
        <h1 class="logo-title">투게더 보드 🧩</h1>
        <p class="subtitle">함께 배우고 문장을 만들어봐요!</p>
        
        <div class="form-group">
            <label for="username">이름이 무엇인가요?</label>
            <input type="text" id="username" placeholder="이름을 입력하세요" autocomplete="off">
        </div>
        
        <div class="role-selector">
            <button class="btn role-btn" data-role="student">👨‍🎓 학생입니다</button>
            <button class="btn role-btn" data-role="teacher">👩‍🏫 선생님입니다</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
    <script src="store.js"></script>
    <script>
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const name = document.getElementById('username').value.trim();
                if (!name) {
                    alert('이름을 입력해주세요!');
                    return;
                }
                const role = e.target.dataset.role;
                
                Store.update('users', (users) => {
                    const u = users || {};
                    if (!u[name]) {
                        u[name] = { role, score: 0 };
                    }
                    return u;
                }, {});

                Store.set('currentUser', { name, role });

                if (role === 'teacher') {
                    window.location.href = 'teacher.html';
                } else {
                    window.location.href = 'student.html';
                }
            });
        });

        Store.set('currentUser', null);
    </script>
</body>
</html>
