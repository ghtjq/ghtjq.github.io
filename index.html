<!DOCTYPE html>
<html>
<head>
    <title>웹사이트</title>
    <style>
        body { text-align: center; background-color: #f0f8ff; }
        h1 { color: #333; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>안녕하세요! 제 웹사이트에 오신 걸 환영합니다.</h1>
    <p>안녕하세요</p>
    <button onclick="alert('반가워요!')">인사하기</button>
<!-- ------------------------------------------------------- -->
    <div style="text-align: center; margin-top: 50px;">
    <h3>버튼을 클릭해 보세요!</h3>
    <button id="counterBtn" onclick="updateButton()" style="padding: 20px 40px; font-size: 30px; cursor: pointer; background-color: #008CBA; color: white; border: none; border-radius: 10px; transition: 0.2s;">
        0
    </button>
</div>

<script>
    let count = 0;

    function updateButton() {
        // 1. 숫자 1 증가
        count = count + 1;
        
        // 2. 버튼 요소(id="counterBtn")를 가져와서 글자를 바꿉니다
        const btn = document.getElementById("counterBtn");
        btn.innerText = count;

        // 3. (보너스) 숫자가 커질 때마다 버튼 색을 조금씩 바꿔볼까요?
        if (count % 10 == 0) {
            btn.style.backgroundColor = "red"; // 10번 누를 때마다 빨간색으로!
        } else {
            btn.style.backgroundColor = "#008CBA";
        }
    }
</script>
</script>
</body>
</html>
